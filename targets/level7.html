<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNICORP â€” CRM Login</title>
<link rel="stylesheet" href="../assets/site.css">
<!--
  OMNICORP // CRM LOGIN // /login
  TODO(legacy): migrate auth to prepared statements â€” still concatenating for now.
-->
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="mark">O</span>OMNICORP<small>CRM PLATFORM</small></div>
  <div class="nav"><a>Leads</a><a>Accounts</a><a class="cta">/login</a></div>
</div>

<div class="authwrap">
  <div class="authcard" style="max-width:520px">
    <span class="eyebrow">restricted Â· crm /login</span>
    <h2>CRM Sign In</h2>
    <div class="sub">Sales staff authentication. The backend assembles your query from raw input.</div>

    <form id="form" autocomplete="off">
      <div class="field"><label>Username</label>
        <input class="input" id="u" type="text" placeholder="name"></div>
      <div class="field"><label>Password</label>
        <input class="input" id="p" type="text" placeholder="password"></div>
      <button class="btn btn-primary btn-block" type="submit">Sign in</button>
    </form>

    <div id="out"></div>
    <div class="notice info" style="margin-top:16px;font-size:12.5px">
      Sales staff only. Contact your administrator if you've forgotten your credentials.
    </div>
  </div>
</div>

<div class="footer"><div class="container"><span>Â© 2049 OMNICORP. CRM platform.</span><span>/login</span></div></div>

<script src="../assets/target.js"></script>
<script>
  GhostNet.init(7);

  var uEl = document.getElementById('u');
  var pEl = document.getElementById('p');

  // The legit CRM page never shows its own SQL. ORACLE's wiretap intercepts the
  // outbound query and relays it to the operator console (left panel) live.
  function buildQuery(){
    return "SELECT * FROM users\nWHERE name='" + uEl.value + "' AND pass='" + pEl.value + "'";
  }
  function sendQuery(){
    try { parent.postMessage({type:'ghostnet:query', level:7, text: buildQuery()}, '*'); } catch(e){}
  }
  uEl.addEventListener('input', sendQuery);
  pEl.addEventListener('input', sendQuery);
  sendQuery(); // seed the wiretap on load

  function isBypass(u){var s=u.toLowerCase().replace(/\s+/g,' ');
    return /'\s*or\s*'?\s*\d+\s*'?\s*=\s*'?\s*\d+/.test(s)||/'\s*or\s*'[^']+'\s*=\s*'[^']+/.test(s)||/'\s*or\s*1\s*=\s*1/.test(s);}

  document.getElementById('form').addEventListener('submit', function(e){
    e.preventDefault();
    var out = document.getElementById('out');
    var username = uEl.value;
    if(isBypass(username)){
      out.innerHTML = '';
      GhostNet.stamp(out, 'Access granted: Signed in to the OMNICORP CRM. Welcome, administrator.');
      GhostNet.solve(7);
    } else {
      out.innerHTML = '<div class="error">Login failed â€” invalid username or password. (0 rows returned)</div>';
    }
  });
</script>
</body>
</html>
